name: 🐛 Bug report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report.

        ⚠️ **Never paste your `.env`, `credentials.json`, tokens, or real email
        content here — this issue is public.** Redact before posting.

        Found a security vulnerability? Don't file it here — see
        [SECURITY.md](https://github.com/J-anubhav/Laze-Me/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What went wrong, and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Ran `python src/main.py --dry-run`
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Full traceback if there is one. Redact any tokens first.
      render: shell

  - type: dropdown
    id: mode
    attributes:
      label: Which categorizer
      options:
        - Free heuristic (no GEMINI_API_KEY)
        - Gemini / Gemma (key set)
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: where
    attributes:
      label: Where it runs
      options:
        - Locally
        - GitHub Actions cron
        - Both
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.1 — from `python --version`"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / Ubuntu 24.04 / macOS 15"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
        - label: I removed all tokens, credentials, and personal email content from this report
          required: true
        - label: I'm on the latest `main`
