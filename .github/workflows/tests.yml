name: Tests

# Runs on every PR and every push to main. This is the check that branch
# protection requires, so it must never need secrets — PRs from forks don't
# get them, and a test suite that needs secrets can't gate outside contributions.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover tests -v

      - name: Check nothing secret is tracked
        run: |
          for f in .env credentials.json token.json state.json; do
            if git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              echo "::error::$f is tracked by git — it must stay ignored."
              exit 1
            fi
          done
          echo "No secret files tracked."
